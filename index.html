<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>iOS Clock Ultra</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#000000;
  --card:#1c1c1e;
  --card2:#2c2c2e;
  --line:rgba(255,255,255,.08);

  --white:#fff;
  --secondary:#8e8e93;

  --orange:#ff9f0a;
  --green:#30d158;
  --red:#ff453a;

  --navH:108px;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

  -webkit-font-smoothing:antialiased;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.03), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.04), transparent 40%);
  pointer-events:none;
}

#app{
  width:100%;
  height:100%;
  position:relative;
  overflow:hidden;
  background:#000;
}

.pages{
  width:400%;
  height:100%;
  display:flex;
  transition:transform .65s cubic-bezier(.32,.72,0,1);
  will-change:transform;
}

.page{
  width:25%;
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  padding-bottom:160px;
  background:#000;
}

.page::-webkit-scrollbar{
  display:none;
}

/* HEADER */

.header{
  padding:
    calc(env(safe-area-inset-top) + 18px)
    22px
    18px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
}

.title{
  font-size:38px;
  line-height:1;
  font-weight:700;
  letter-spacing:-1.6px;
}

.add-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  color:var(--orange);
  background:rgba(255,255,255,.08);
  font-size:28px;
  font-weight:200;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

/* WORLD CLOCK */

.clock-list{
  padding:0 20px;
}

.clock-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 0;
  border-bottom:1px solid var(--line);
}

.clock-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.analog{
  width:42px;
  height:42px;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  position:relative;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.09), transparent 60%);
}

.hand{
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:bottom center;
  border-radius:20px;
}

.hand.hour{
  width:2px;
  height:11px;
  margin-left:-1px;
  background:#fff;
}

.hand.min{
  width:1.5px;
  height:15px;
  margin-left:-0.75px;
  background:#fff;
}

.center-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:#fff;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.region{
  font-size:13px;
  color:var(--secondary);
  margin-bottom:3px;
}

.city{
  font-size:24px;
  font-weight:300;
  letter-spacing:-.5px;
}

.offset{
  margin-top:4px;
  font-size:13px;
  color:var(--secondary);
}

.clock-time{
  font-size:58px;
  font-weight:100;
  letter-spacing:-4px;
  line-height:.95;
  font-variant-numeric:tabular-nums;
}

.ampm{
  font-size:22px;
  font-weight:300;
  margin-left:4px;
}

.day{
  margin-top:6px;
  font-size:13px;
  color:var(--secondary);
  text-align:right;
}

/* ALARM */

.alarm-list{
  padding:0 20px;
}

.alarm{
  padding:18px 0;
  border-bottom:1px solid var(--line);
}

.alarm-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.alarm-label{
  font-size:15px;
  color:var(--secondary);
}

.alarm-time{
  font-size:62px;
  font-weight:100;
  letter-spacing:-4px;
  line-height:1;
}

.alarm-days{
  margin-top:5px;
  font-size:13px;
  color:var(--secondary);
}

/* TOGGLE */

.toggle{
  width:52px;
  height:32px;
  border-radius:50px;
  background:#39393d;
  position:relative;
  transition:.25s;
}

.toggle::after{
  content:"";
  position:absolute;
  top:2px;
  left:2px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#fff;
  transition:.28s cubic-bezier(.34,1.56,.64,1);
  box-shadow:
    0 3px 10px rgba(0,0,0,.4),
    inset 0 1px 1px rgba(255,255,255,.4);
}

.toggle.active{
  background:var(--green);
}

.toggle.active::after{
  transform:translateX(20px);
}

/* STOPWATCH */

.stopwatch-display{
  padding-top:10px;
  text-align:center;
}

.stopwatch-time{
  font-size:92px;
  font-weight:100;
  letter-spacing:-6px;
  font-variant-numeric:tabular-nums;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px 42px;
}

.circle-btn{
  width:84px;
  height:84px;
  border-radius:50%;
  border:none;
  color:#fff;
  font-size:18px;
  position:relative;
  overflow:hidden;
}

.circle-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

.circle-btn span{
  position:relative;
  z-index:2;
}

.gray{
  background:rgba(255,255,255,.08);
}

.green{
  background:rgba(48,209,88,.18);
  color:var(--green);
}

.red{
  background:rgba(255,69,58,.18);
  color:var(--red);
}

/* TIMER */

.timer-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:20px;
  position:relative;
}

svg{
  width:320px;
  height:320px;
  transform:rotate(-90deg);
}

.track{
  fill:none;
  stroke:rgba(255,255,255,.08);
  stroke-width:10;
}

.progress{
  fill:none;
  stroke:url(#grad);
  stroke-width:10;
  stroke-linecap:round;
  stroke-dasharray:879;
  stroke-dashoffset:0;
}

.timer-center{
  position:absolute;
  text-align:center;
}

.timer-time{
  font-size:74px;
  font-weight:100;
  letter-spacing:-4px;
  font-variant-numeric:tabular-nums;
}

/* ULTRA IOS 26 LIQUID TAB BAR */

.tabbar-wrap{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:150px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:max(14px, env(safe-area-inset-bottom));
  pointer-events:none;
}

.tabbar{
  width:calc(100% - 22px);
  max-width:760px;
  height:88px;
  border-radius:44px;
  position:relative;
  pointer-events:auto;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 38%,
      rgba(255,255,255,.05) 100%
    );

  backdrop-filter:
    blur(40px)
    saturate(220%)
    brightness(1.15);

  -webkit-backdrop-filter:
    blur(40px)
    saturate(220%)
    brightness(1.15);

  border:
    1px solid rgba(255,255,255,.20);

  box-shadow:
    0 1px 0 rgba(255,255,255,.18) inset,
    0 -1px 0 rgba(0,0,0,.35) inset,
    0 20px 40px rgba(0,0,0,.55),
    0 4px 14px rgba(0,0,0,.5);

  overflow:hidden;
}

.tabbar::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;

  background:
    radial-gradient(circle at 20% 0%, rgba(255,255,255,.22), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(255,255,255,.18), transparent 32%),
    radial-gradient(circle at 50% 120%, rgba(255,255,255,.08), transparent 50%);

  mix-blend-mode:screen;
  pointer-events:none;
}

.tabbar::after{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:43px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.14),
      rgba(255,255,255,.02)
    );

  pointer-events:none;
}

.tabs{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-around;
  position:relative;
  z-index:5;
}

.active-pill{
  position:absolute;
  width:86px;
  height:72px;
  left:10px;
  top:8px;
  border-radius:36px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.42),
      rgba(255,255,255,.14)
    );

  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);

  border:1px solid rgba(255,255,255,.34);

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.5),
    inset 0 -1px 2px rgba(0,0,0,.12),
    0 8px 18px rgba(0,0,0,.28),
    0 0 18px rgba(255,255,255,.08);

  transition:
    transform .65s cubic-bezier(.22,1,.36,1),
    width .4s;

  overflow:hidden;
}

.active-pill::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.65), transparent 30%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,.08), transparent 45%);

  opacity:.9;
}

.tab{
  width:25%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  position:relative;
  z-index:10;
  cursor:pointer;
}

.tab svg{
  width:27px;
  height:27px;
  transform:none;
}

.tab svg *{
  transition:.3s;
}

.tab span{
  font-size:10px;
  font-weight:600;
  letter-spacing:.15px;
  color:#8e8e93;
  transition:.3s;
}

.tab.active span{
  color:#fff;
}

.tab.active svg *{
  stroke:#fff !important;
  fill:#fff !important;
}

.tab:active{
  transform:scale(.94);
}

/* TOAST */

.toast{
  position:fixed;
  left:50%;
  bottom:140px;
  transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,30,.82);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  padding:12px 20px;
  border-radius:22px;
  opacity:0;
  transition:.35s;
  pointer-events:none;
  font-size:15px;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<div id="app">

  <div class="pages" id="pages">

    <!-- WORLD -->
    <section class="page">

      <div class="header">
        <div class="title">World Clock</div>
        <button class="add-btn">+</button>
      </div>

      <div class="clock-list" id="worldList"></div>

    </section>

    <!-- ALARM -->
    <section class="page">

      <div class="header">
        <div class="title">Alarm</div>
        <button class="add-btn">+</button>
      </div>

      <div class="alarm-list">

        <div class="alarm">
          <div class="alarm-top">
            <div class="alarm-label">Wake Up</div>
            <div class="toggle active"></div>
          </div>

          <div class="alarm-time">
            6:30 <span style="font-size:26px">AM</span>
          </div>

          <div class="alarm-days">Every Day</div>
        </div>

        <div class="alarm">
          <div class="alarm-top">
            <div class="alarm-label">Gym</div>
            <div class="toggle"></div>
          </div>

          <div class="alarm-time">
            8:00 <span style="font-size:26px">AM</span>
          </div>

          <div class="alarm-days">Weekdays</div>
        </div>

      </div>

    </section>

    <!-- STOPWATCH -->
    <section class="page">

      <div class="header">
        <div class="title">Stopwatch</div>
      </div>

      <div class="stopwatch-display">
        <div class="stopwatch-time" id="sw">
          00:00.00
        </div>
      </div>

      <div class="controls">
        <button class="circle-btn gray">
          <span>Lap</span>
        </button>

        <button class="circle-btn green" id="swBtn">
          <span>Start</span>
        </button>
      </div>

    </section>

    <!-- TIMER -->
    <section class="page">

      <div class="header">
        <div class="title">Timer</div>
      </div>

      <div class="timer-wrap">

        <svg viewBox="0 0 320 320">
          <defs>
            <linearGradient id="grad">
              <stop offset="0%" stop-color="#ff9f0a"/>
              <stop offset="100%" stop-color="#ffd60a"/>
            </linearGradient>
          </defs>

          <circle class="track" cx="160" cy="160" r="140"></circle>

          <circle
            class="progress"
            id="prog"
            cx="160"
            cy="160"
            r="140"
          ></circle>
        </svg>

        <div class="timer-center">
          <div class="timer-time" id="timerText">
            15:00
          </div>
        </div>

      </div>

      <div class="controls">
        <button class="circle-btn gray">
          <span>Cancel</span>
        </button>

        <button class="circle-btn green">
          <span>Start</span>
        </button>
      </div>

    </section>

  </div>

  <!-- IOS 26 LIQUID GLASS TAB BAR -->

  <div class="tabbar-wrap">

    <div class="tabbar">

      <div class="active-pill" id="pill"></div>

      <div class="tabs">

        <div class="tab active" data-index="0">

          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9.5" stroke="#8e8e93" stroke-width="1.8"/>
            <path d="M12 7v5l3 2" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
          </svg>

          <span>World Clock</span>

        </div>

        <div class="tab" data-index="1">

          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="13" r="8.5" stroke="#8e8e93" stroke-width="1.8"/>
            <path d="M12 9v4l2 2" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M7 3L5 5" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M17 3l2 2" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
          </svg>

          <span>Alarm</span>

        </div>

        <div class="tab" data-index="2">

          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="13" r="8.5" stroke="#8e8e93" stroke-width="1.8"/>
            <path d="M12 9v4l2.5 2.5" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9 2h6" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round"/>
          </svg>

          <span>Stopwatch</span>

        </div>

        <div class="tab" data-index="3">

          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="13" r="8.5" stroke="#8e8e93" stroke-width="1.8"/>
            <path d="M12 8v5" stroke="#8e8e93" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="12" cy="13" r="1.5" fill="#8e8e93"/>
          </svg>

          <span>Timer</span>

        </div>

      </div>

    </div>

  </div>

  <div class="toast" id="toast">
    iOS Liquid Glass
  </div>

</div>

<script>
/* WORLD CLOCK */

const cities = [
  {
    city:"New York",
    region:"United States",
    tz:"America/New_York"
  },
  {
    city:"London",
    region:"United Kingdom",
    tz:"Europe/London"
  },
  {
    city:"Tokyo",
    region:"Japan",
    tz:"Asia/Tokyo"
  },
  {
    city:"Paris",
    region:"France",
    tz:"Europe/Paris"
  },
  {
    city:"Dubai",
    region:"UAE",
    tz:"Asia/Dubai"
  }
];

const worldList = document.getElementById("worldList");

function buildWorld(){

  worldList.innerHTML = cities.map((c,i)=>`
  
  <div class="clock-item">

    <div class="clock-left">

      <div class="analog">
        <div class="hand hour" id="h${i}"></div>
        <div class="hand min" id="m${i}"></div>
        <div class="center-dot"></div>
      </div>

      <div>
        <div class="region">${c.region}</div>
        <div class="city">${c.city}</div>
        <div class="offset">${offset(c.tz)}</div>
      </div>

    </div>

    <div>

      <div class="clock-time" id="time${i}">
        00:00
      </div>

      <div class="day" id="day${i}">
        Today
      </div>

    </div>

  </div>

  `).join("");

}

function offset(tz){

  const now = new Date();

  const local = new Date(
    now.toLocaleString("en-US",{timeZone:tz})
  );

  const diff = (
    local - now
  ) / 3600000;

  return `${diff >= 0 ? "+" : ""}${Math.round(diff)}HRS`;

}

function updateClocks(){

  cities.forEach((c,i)=>{

    const now = new Date();

    const parts = new Intl.DateTimeFormat(
      "en-US",
      {
        timeZone:c.tz,
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
      }
    ).formatToParts(now);

    let h,m,s,a;

    parts.forEach(p=>{
      if(p.type==="hour")h=p.value;
      if(p.type==="minute")m=p.value;
      if(p.type==="second")s=p.value;
      if(p.type==="dayPeriod")a=p.value;
    });

    document.getElementById(`time${i}`).innerHTML =
      `${h}:${m}<span class="ampm">${a}</span>`;

    document.getElementById(`day${i}`).innerText =
      new Intl.DateTimeFormat(
        "en-US",
        {
          weekday:"long",
          month:"short",
          day:"numeric",
          timeZone:c.tz
        }
      ).format(now);

    const hr = (+h % 12) + (+m / 60);

    document.getElementById(`h${i}`).style.transform =
      `rotate(${hr * 30}deg)`;

    document.getElementById(`m${i}`).style.transform =
      `rotate(${(+m) * 6}deg)`;

  });

}

buildWorld();
updateClocks();

setInterval(updateClocks,1000);

/* TAB BAR */

const tabs = document.querySelectorAll(".tab");
const pages = document.getElementById("pages");
const pill = document.getElementById("pill");

tabs.forEach(tab=>{

  tab.addEventListener("click",()=>{

    tabs.forEach(t=>t.classList.remove("active"));

    tab.classList.add("active");

    const i = +tab.dataset.index;

    pages.style.transform =
      `translateX(-${i * 25}%)`;

    pill.style.transform =
      `translateX(${i * 100}%)`;

  });

});

/* TOGGLES */

document.querySelectorAll(".toggle").forEach(t=>{

  t.addEventListener("click",()=>{

    t.classList.toggle("active");

  });

});

/* STOPWATCH */

let running = false;
let start = 0;
let elapsed = 0;
let raf;

const sw = document.getElementById("sw");
const swBtn = document.getElementById("swBtn");

function format(ms){

  const total = Math.floor(ms / 10);

  const min =
    String(Math.floor(total / 6000)).padStart(2,"0");

  const sec =
    String(Math.floor(total / 100) % 60).padStart(2,"0");

  const centi =
    String(total % 100).padStart(2,"0");

  return `${min}:${sec}.${centi}`;

}

function tick(){

  if(!running)return;

  elapsed = performance.now() - start;

  sw.innerText = format(elapsed);

  raf = requestAnimationFrame(tick);

}

swBtn.onclick = ()=>{

  running = !running;

  if(running){

    start = performance.now() - elapsed;

    swBtn.classList.remove("green");
    swBtn.classList.add("red");

    swBtn.innerHTML = "<span>Stop</span>";

    tick();

  }else{

    cancelAnimationFrame(raf);

    swBtn.classList.remove("red");
    swBtn.classList.add("green");

    swBtn.innerHTML = "<span>Start</span>";

  }

};

/* TOAST */

const toast = document.getElementById("toast");

setTimeout(()=>{

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },2200);

},800);

/* PARALLAX GLASS */

document.addEventListener("pointermove",e=>{

  const x = e.clientX / innerWidth;
  const y = e.clientY / innerHeight;

  document.querySelector(".tabbar").style.transform =
    `
      rotateY(${(x - .5) * 5}deg)
      rotateX(${(.5 - y) * 5}deg)
    `;

});
</script>

</body>
</html>
